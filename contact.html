       <div class="container mt-5 mb-5">
        <h1 class="mb-4 text-center">Contact Our Team</h1>
        <p class="text-center text-muted mb-5">Have questions about our exotic inventory or want to schedule a test drive? Send us a message.</p>
        
        <div class="row justify-content-center">
            <div class="col-lg-8">
                
                <div id="formAlert" class="alert d-none" role="alert"></div>

                <form id="contactForm" novalidate>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="fullName" class="form-label">Full Name *</label>
                            <input type="text" class="form-control bg-dark text-light border-secondary" id="fullName" placeholder="John Doe">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="emailAddress" class="form-label">Email Address *</label>
                            <input type="email" class="form-control bg-dark text-light border-secondary" id="emailAddress" placeholder="john@example.com">
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="phoneNumber" class="form-label">Phone Number</label>
                        <input type="tel" class="form-control bg-dark text-light border-secondary" id="phoneNumber" placeholder="(555) 123-4567">
                    </div>

                    <div class="mb-4">
                        <label for="messageText" class="form-label">Your Message *</label>
                        <textarea class="form-control bg-dark text-light border-secondary" id="messageText" rows="5" placeholder="I am interested in the..."></textarea>
                    </div>

                    <button type="submit" class="btn btn-outline-light w-100 py-2 text-uppercase fw-bold tracking-wide">Send Inquiry</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="js/main.js"></script>
